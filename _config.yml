description: >
  I am a Research Assistant at TU Bergakademie Freiberg (TUBAF). Currently, I
  am an active contributor to the ProofBench project, an initiative dedicated
  to benchmarking the performance of Large Language Models (LLMs) in generating
  and verifying formal mathematical proofs. My primary research interests lie
  in Lean 4 and the ProofBench framework. A significant portion of my technical
  work involves the Lean 4 ecosystem, where I focus on formalizing mathematical
  structures and developing tools to bridge the gap between symbolic logic and
  neural search strategies.

